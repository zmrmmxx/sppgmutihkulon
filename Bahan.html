<!-- Page: Master Bahan -->
<div id="page-bahan" class="page-content hidden">

    <!-- Header Page -->
    <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Inventaris Bahan</h2>
            <p class="text-sm text-gray-500 mt-1">Pantau stok bahan kering dan bahan basah dapur terpusat.</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
            <button onclick="exportBahanXLSX()" class="flex-1 sm:flex-none justify-center bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold shadow-sm transition-all flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Export XLSX
            </button>
            <button onclick="openModalBahan()" class="flex-1 sm:flex-none justify-center bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold shadow-sm transition-all flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Tambah Bahan
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-col items-center justify-between gap-4 lg:flex-row">
        <div class="flex flex-col sm:flex-row gap-3 w-full items-center">
            
            <div class="relative w-full sm:w-64">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchBahan" onkeyup="filterTable('table-bahan')" class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-amber-500 text-sm" placeholder="Cari nama bahan...">
            </div>
            
            <div class="w-px h-8 bg-gray-200 hidden sm:block mx-2"></div>
            
            <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">
                <label class="text-xs font-semibold text-gray-600 whitespace-nowrap">Rentang Rekap:</label>
                <input type="date" id="filterStartDateBahan" onchange="filterTable('table-bahan')" class="block w-full sm:w-auto px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-amber-500 text-sm">
                <span class="text-gray-400 text-sm font-medium hidden sm:inline">-</span>
                <input type="date" id="filterEndDateBahan" onchange="filterTable('table-bahan')" class="block w-full sm:w-auto px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-amber-500 text-sm">
            </div>
            
            <button onclick="document.getElementById('searchBahan').value=''; document.getElementById('filterStartDateBahan').value=''; document.getElementById('filterEndDateBahan').value=''; filterTable('table-bahan');" class="text-xs text-amber-600 font-semibold hover:text-amber-800 transition-colors px-2 whitespace-nowrap ml-auto sm:ml-2">Reset Filter</button>
        </div>
    </div>

    <!-- Tabs Container -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
        <div class="border-b border-gray-100 px-2 sm:px-6 pt-2">
            <nav class="-mb-px flex space-x-6 overflow-x-auto" aria-label="Tabs">
                <button onclick="switchTabBahan('basah')" id="tab-basah" class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-amber-500 text-amber-600 transition-colors flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Bahan Basah
                </button>
                <button onclick="switchTabBahan('kering')" id="tab-kering" class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    Bahan Kering
                </button>
            </nav>
        </div>
        
        <!-- Table Area -->
        <div class="relative min-h-[300px]">
            <!-- Loading -->
            <div id="loading-bahan" class="absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-amber-500 mb-2"></div>
                <span class="text-sm font-medium text-gray-500">Memuat Stok Master...</span>
            </div>

            <div class="overflow-x-auto">
                <table id="table-bahan" class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Nama & Kategori</th>
                            <th scope="col" class="px-6 py-4 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Qty Stok</th>
                            <th scope="col" class="px-6 py-4 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Tgl Update</th>
                            <th scope="col" class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-bahan" class="bg-white divide-y divide-gray-100">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="empty-bahan" class="hidden py-16 text-center text-gray-500">
                 <svg class="mx-auto h-12 w-12 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                 <span class="block text-sm font-medium text-gray-900">Stok Bahan Kosong</span>
                 <span class="block text-sm mt-1">Belum ada bahan dalam kategori ini.</span>
            </div>
        </div>
    </div>
</div>

<!-- Modal Form Bahan -->
<div id="modal-bahan" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeModal('modal-bahan')"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        
        <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md w-full scale-100">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 border-b border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-bold text-gray-900" id="bahan-modal-title">Tambah / Update Stok</h3>
                    <button onclick="closeModal('modal-bahan')" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <form id="form-bahan" onsubmit="saveBahan(event)" class="space-y-4">
                    <input type="hidden" id="bahan-id" name="id">
                    
                    <div>
                        <label for="bahan-nama" class="block text-sm font-semibold text-gray-700 mb-1">Nama Bahan <span class="text-red-500">*</span></label>
                        <input type="text" id="bahan-nama" name="nama" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 text-sm bg-gray-50 focus:bg-white" placeholder="Cari beras, ayam, bumbu...">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="bahan-kategori" class="block text-sm font-semibold text-gray-700 mb-1">Kategori <span class="text-red-500">*</span></label>
                            <select id="bahan-kategori" name="kategori" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 text-sm bg-gray-50 focus:bg-white">
                                <option value="Bahan Basah">Bahan Basah</option>
                                <option value="Bahan Kering">Bahan Kering</option>
                            </select>
                        </div>
                        <div>
                            <label for="bahan-satuan" class="block text-sm font-semibold text-gray-700 mb-1">Satuan <span class="text-red-500">*</span></label>
                            <select id="bahan-satuan" name="satuan" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 text-sm bg-gray-50 focus:bg-white">
                                <option value="Kg">Kg</option>
                                <option value="Liter">Liter</option>
                                <option value="Pcs">Pcs</option>
                                <option value="Ikat">Ikat</option>
                                <option value="Pack">Pack</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label for="bahan-stok" class="block text-sm font-semibold text-gray-700 mb-1">Jumlah Stok Saat Ini <span class="text-red-500">*</span></label>
                        <div class="relative rounded-md shadow-sm">
                            <input type="number" id="bahan-stok" name="stok" step="0.1" min="0" required class="w-full pl-3 pr-12 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 text-lg font-bold text-gray-900 bg-gray-50 focus:bg-white" placeholder="0">
                            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-500 text-sm italic">
                                Satuan
                            </div>
                        </div>
                        <p class="text-xs text-red-500 mt-1">* Baris akan berwarna merah bila stok kurang dari 10.</p>
                    </div>
                </form>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse rounded-b-2xl">
                <button type="submit" form="form-bahan" id="btn-save-bahan" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-2 bg-amber-500 text-base font-medium text-white hover:bg-amber-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                    Simpan Stok
                </button>
                <button type="button" onclick="closeModal('modal-bahan')" class="mt-3 w-full inline-flex justify-center rounded-xl border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                    Batal
                </button>
            </div>
        </div>
    </div>
</div>

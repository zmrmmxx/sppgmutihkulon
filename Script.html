<script>
  // State management
  let currentUser = null;

  // Initialize App
  document.addEventListener("DOMContentLoaded", () => {
    // Simulasi loading screen singkat
    setTimeout(() => {
        checkSession();
        startClock();
        startMenuSlider();
    }, 800);
  });

  function startClock() {
    function updateClock() {
        const now = new Date();
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        
        const dayName = days[now.getDay()];
        const date = now.getDate();
        const monthName = months[now.getMonth()];
        const year = now.getFullYear();
        
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        const dateStr = `${dayName}, ${date} ${monthName} ${year}`;
        const timeStr = `${hours}:${minutes}:${seconds}`;
        
        const clockDateEl = document.getElementById('clock-date');
        const clockTimeEl = document.getElementById('clock-time');
        
        if (clockDateEl) clockDateEl.innerText = dateStr;
        if (clockTimeEl) clockTimeEl.innerText = timeStr;
    }
    
    updateClock();
    setInterval(updateClock, 1000);
  }

  function startMenuSlider() {
      let currentSlide = 1;
      const totalSlides = 5;
      
      setInterval(() => {
          // Only cycle if we're on the Menu page
          const menuPage = document.getElementById('page-menu');
          if (menuPage && !menuPage.classList.contains('hidden')) {
              const prevSlide = document.getElementById('gizi-slide-' + currentSlide);
              if (prevSlide) {
                  prevSlide.classList.remove('opacity-100', 'z-10');
                  prevSlide.classList.add('opacity-0', 'z-0');
              }
              
              currentSlide = (currentSlide % totalSlides) + 1;
              
              const nextSlide = document.getElementById('gizi-slide-' + currentSlide);
              if (nextSlide) {
                  nextSlide.classList.remove('opacity-0', 'z-0');
                  nextSlide.classList.add('opacity-100', 'z-10');
              }
          }
      }, 30000); // 30 seconds
  }

  function checkSession() {
    const sessionData = localStorage.getItem('sppg_session');
    
    // Hide loading
    const loadingEl = document.getElementById('loading');
    loadingEl.classList.add('fade-out');
    
    setTimeout(() => {
        loadingEl.classList.add('hidden');
        loadingEl.classList.remove('fade-out');
        
        if (sessionData) {
            try {
                currentUser = JSON.parse(sessionData);
                showMainApp();
            } catch(e) {
                localStorage.removeItem('sppg_session');
                showLogin();
            }
        } else {
            showLogin();
        }
    }, 300);
  }

  function showLogin() {
    document.getElementById('login-section').classList.remove('hidden');
    document.getElementById('main-section').classList.add('hidden');
  }

  function showMainApp() {
    document.getElementById('login-section').classList.add('hidden');
    const mainSection = document.getElementById('main-section');
    mainSection.classList.remove('hidden');
    mainSection.classList.add('fade-in');
    
    if (currentUser) {
      const userNameTop = document.getElementById('user-name');
      if(userNameTop) userNameTop.innerText = currentUser.username;
      
      const roleDisplay = document.getElementById('user-role-display');
      if(roleDisplay) roleDisplay.innerText = currentUser.role || 'User';
      
      const nameDisplay = document.getElementById('user-name-display');
      if(nameDisplay) nameDisplay.innerText = currentUser.username;
      
      const avatarDisplay = document.getElementById('user-avatar');
      if(avatarDisplay) avatarDisplay.innerText = currentUser.username.charAt(0).toUpperCase();
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('login-error');
    const errorText = document.getElementById('login-error-text');
    
    const username = form.username.value;
    const password = form.password.value;

    if(!username || !password) return;

    // Set loading state
    const originalBtnText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<div class="flex items-center justify-center">
                        <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-2"></div>
                        Memproses...
                     </div>`;
    errorDiv.classList.add('hidden');

    // Call Google Apps Script backend
    if(typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler(function(response) {
            btn.disabled = false;
            btn.innerHTML = `Sign In Dashboard`;
            
            if (response.success) {
              localStorage.setItem('sppg_session', JSON.stringify(response.user));
              currentUser = response.user;
              
              showToast('Login berhasil!', 'success');
              
              // Transition
              document.getElementById('login-section').classList.add('fade-out');
              setTimeout(() => {
                  document.getElementById('login-section').classList.remove('fade-out');
                  showMainApp();
              }, 300);
              
            } else {
              errorText.innerText = response.message;
              errorDiv.classList.remove('hidden');
              errorDiv.classList.add('fade-in');
            }
          })
          .withFailureHandler(function(error) {
            btn.disabled = false;
            btn.innerHTML = `Sign In Dashboard`;
            errorText.innerText = "Terjadi kesalahan koneksi ke server.";
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('fade-in');
          })
          .verifyLogin(username, password);
    } else {
        // For local development UI testing
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = `Sign In Dashboard`;
            if(username === 'admin' && password === '1234') {
                const dummyUser = {id: 'U001', username: 'admin', role: 'Admin'};
                localStorage.setItem('sppg_session', JSON.stringify(dummyUser));
                currentUser = dummyUser;
                showMainApp();
                showToast('Login berhasil!', 'success');
            } else {
                errorText.innerText = "Login Gagal. Pastikan Anda menjalankan ini di Google Apps Script.";
                errorDiv.classList.remove('hidden');
            }
        }, 1000);
    }
  }

  function logout() {
    localStorage.removeItem('sppg_session');
    currentUser = null;
    
    document.getElementById('main-section').classList.add('fade-out');
    
    setTimeout(() => {
        document.getElementById('main-section').classList.remove('fade-out');
        showLogin();
        document.getElementById('loginForm').reset();
    }, 300);
  }

  function initDB() {
    if(confirm('Anda yakin ingin menginisialisasi ulang database? Pastikan ini pertama kali setup.')) {
        showToast('Memulai inisialisasi database...', 'info');
        
        if(typeof google !== 'undefined') {
            google.script.run
              .withSuccessHandler(function(res) {
                showToast(res, 'success');
              })
              .withFailureHandler(function(err) {
                showToast("Gagal: " + err.message, 'error');
              })
              .initializeDatabase();
        } else {
            showToast('Fungsi ini hanya berjalan di lingkungan Google Apps Script.', 'error');
        }
    }
  }

  // Toast Notification System
  function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      if(!container) return;
      
      const toast = document.createElement('div');
      
      // Determine color
      let baseClass = 'bg-white border text-gray-800';
      let icon = '';
      
      if (type === 'success') {
          baseClass = 'bg-green-50 border-green-200 text-green-800';
          icon = `<svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
      } else if (type === 'error') {
          baseClass = 'bg-red-50 border-red-200 text-red-800';
          icon = `<svg class="w-5 h-5 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
      } else {
          baseClass = 'bg-blue-50 border-blue-200 text-blue-800';
          icon = `<svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      }
      
      toast.className = `flexitems-center p-4 rounded-lg shadow-md border fade-in-up ${baseClass}`;
      toast.innerHTML = `<div class="flex items-center">${icon}<span class="text-sm font-medium">${message}</span></div>`;
      
      container.appendChild(toast);
      
      // Remove after 3 seconds
      setTimeout(() => {
          toast.classList.remove('fade-in-up');
          toast.classList.add('fade-out');
          setTimeout(() => {
              toast.remove();
          }, 300);
      }, 3000);
  }

  // ==== PAGE NAVIGATION ====
  function loadPage(pageId, linkElement = null) {
      // Sembunyikan semua halaman
      const allPages = document.querySelectorAll('.page-content');
      allPages.forEach(p => {
          p.classList.add('hidden');
          p.classList.remove('fade-in');
      });
      
      // Tampilkan halaman aktif
      const targetPage = document.getElementById('page-' + pageId);
      if(targetPage) {
          targetPage.classList.remove('hidden');
          targetPage.classList.add('fade-in');
      }

      // Update active state sidebar desktop
      if(linkElement) {
          const allLinks = document.querySelectorAll('.sidebar-link');
          allLinks.forEach(link => {
              link.classList.remove('bg-blue-50', 'text-blue-700', 'active');
              link.classList.add('text-gray-600', 'hover:bg-gray-100', 'hover:text-gray-900');
              
              // Reset icon color
              const icon = link.querySelector('svg');
              if(icon) {
                 icon.classList.remove('text-blue-600');
                 icon.classList.add('text-gray-400', 'group-hover:text-gray-600');
              }
          });
          
          linkElement.classList.remove('text-gray-600', 'hover:bg-gray-100', 'hover:text-gray-900');
          linkElement.classList.add('bg-blue-50', 'text-blue-700', 'active');
          const activeIcon = linkElement.querySelector('svg');
          if(activeIcon) {
             activeIcon.classList.remove('text-gray-400', 'group-hover:text-gray-600');
             activeIcon.classList.add('text-blue-600');
          }
      }

      // Fetch dashboard data if loading dashboard
      if (pageId === 'dashboard') {
          fetchDashboardStats();
      }
      
      // Fetch options for Laporan if loading laporan
      if (pageId === 'laporan') {
          loadDataLaporan();
      }

      // Close sidebar mobile if open
      if(window.innerWidth < 1024) { // Tailwind lg break point
          const sidebar = document.getElementById('sidebar-container');
          if(!sidebar.classList.contains('-translate-x-full')) {
              toggleSidebar();
          }
      }
  }

  // Toggle Sidebar Mobile
  function toggleSidebar() {
      const sidebar = document.getElementById('sidebar-container');
      const overlay = document.getElementById('sidebar-overlay');
      
      sidebar.classList.toggle('-translate-x-full');
      
      if(sidebar.classList.contains('-translate-x-full')) {
          overlay.classList.add('hidden');
          overlay.classList.remove('opacity-100');
      } else {
          overlay.classList.remove('hidden');
          // small timeout for transition to trigger
          setTimeout(() => {
              overlay.classList.add('opacity-100');
          }, 10);
      }
  }

  // ==== DASHBOARD & CHARTS ====
  let barChartInst = null;
  let donutChartInst = null;

  function fetchDashboardStats() {
      document.getElementById('chart-bar-loading').classList.remove('hidden');
      document.getElementById('chart-donut-loading').classList.remove('hidden');

      if(typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(function(data) {
                updateDashboardUI(data);
            })
            .withFailureHandler(function(err) {
                console.error("Gagal load stats", err);
                document.getElementById('chart-bar-loading').classList.add('hidden');
                document.getElementById('chart-donut-loading').classList.add('hidden');
            })
            .getDashboardStats();
      } else {
          // Dummy data local
          setTimeout(() => {
              updateDashboardUI({
                  sekolah: 12,
                  siswa: 2540,
                  menu: 8,
                  distribusiHariIni: 450,
                  chartSekolah: { labels: ['SDN 1 Mutih', 'SDN 2 Mutih', 'MI Darussalam', 'TK Kartika'], data: [320, 250, 180, 50] },
                  chartMenu: { labels: ['Ayam Tepung', 'Telor Dadar', 'Ikan Goreng', 'Nugget'], data: [45, 30, 15, 10] }
              });
          }, 1000);
      }
  }

  function updateDashboardUI(data) {
     // Animation numbers function
     animateValue("stat-sekolah", 0, data.sekolah, 1000);
     animateValue("stat-siswa", 0, data.siswa, 1500);
     animateValue("stat-menu", 0, data.menu, 1000);
     animateValue("stat-distribusi", 0, data.distribusiHariIni, 1200);

     // Hide loaders
     document.getElementById('chart-bar-loading').classList.add('hidden');
     document.getElementById('chart-donut-loading').classList.add('hidden');

     // Init charts
     renderCharts(data.chartSekolah, data.chartMenu);
  }

  function animateValue(id, start, end, duration) {
      if (start === end) {
          document.getElementById(id).innerHTML = end;
          return;
      }
      var range = end - start;
      var current = start;
      var increment = end > start? 1 : -1;
      
      // hitung steps agar tidak terlalu berat
      var stepTime = Math.abs(Math.floor(duration / range));
      if(stepTime < 20) stepTime = 20; 
      increment = Math.ceil(range / (duration / stepTime));

      var obj = document.getElementById(id);
      var timer = setInterval(function() {
          current += increment;
          if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
              current = end;
              clearInterval(timer);
          }
          // Format with separator
          obj.innerHTML = current.toLocaleString('id-ID');
      }, stepTime);
  }

  function renderCharts(sekolahData, menuData) {
      // 1. Bar Chart Setup
      const ctxBar = document.getElementById('barChart').getContext('2d');
      if(barChartInst) barChartInst.destroy();

      barChartInst = new Chart(ctxBar, {
          type: 'bar',
          data: {
              labels: sekolahData.labels,
              datasets: [{
                  label: 'Jumlah Siswa',
                  data: sekolahData.data,
                  backgroundColor: 'rgba(59, 130, 246, 0.8)',
                  borderColor: 'rgba(37, 99, 235, 1)',
                  borderWidth: 1,
                  borderRadius: 6,
                  barPercentage: 0.6
              }]
          },
          options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                  legend: { display: false },
                  tooltip: {
                      callbacks: {
                          label: function(context) {
                              return context.parsed.y + ' Siswa';
                          }
                      }
                  }
              },
              scales: {
                  y: { beginAtZero: true, grid: { borderDash: [4, 4], color: '#f3f4f6' } },
                  x: { grid: { display: false } }
              }
          }
      });

      // 2. Donut Chart Setup
      const ctxDonut = document.getElementById('donutChart').getContext('2d');
      if(donutChartInst) donutChartInst.destroy();

      donutChartInst = new Chart(ctxDonut, {
          type: 'doughnut',
          data: {
              labels: menuData.labels,
              datasets: [{
                  data: menuData.data,
                  backgroundColor: [
                      'rgba(59, 130, 246, 0.8)', // Blue
                      'rgba(16, 185, 129, 0.8)', // Green
                      'rgba(245, 158, 11, 0.8)', // Yellow
                      'rgba(139, 92, 246, 0.8)', // Purple
                      'rgba(239, 68, 68, 0.8)'   // Red
                  ],
                  borderWidth: 0,
                  hoverOffset: 4
              }]
          },
          options: {
              responsive: true,
              maintainAspectRatio: false,
              cutout: '70%',
              plugins: {
                  legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8 } }
              }
          }
      });
  }

  // ==========================================
  // GLOBALS & UTILS
  // ==========================================
  let dataSekolah = [];
  let dataMenu = [];
  let dataBahan = [];
  
  // Pagination State Sekolah
  let sekolahCurrentPage = 1;
  const sekolahItemsPerPage = 10;
  let filteredSekolah = [];

  function closeModal(modalId) {
      document.getElementById(modalId).classList.add('hidden');
  }

  function renderEmptyState(tableId, emptyId, hasData) {
      if (hasData) {
          document.getElementById(tableId).classList.remove('hidden');
          document.getElementById(emptyId).classList.add('hidden');
      } else {
          document.getElementById(tableId).classList.add('hidden');
          document.getElementById(emptyId).classList.remove('hidden');
      }
  }

  // ==========================================
  // CRUD SEKOLAH
  // ==========================================
  function loadDataSekolah() {
      document.getElementById('loading-sekolah').classList.remove('hidden');
      
      if(typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(function(res) {
                if(res.status === 'success') {
                    dataSekolah = res.data;
                    filteredSekolah = [...dataSekolah];
                    sekolahCurrentPage = 1;
                    renderTableSekolah();
                } else {
                    showToast(res.message, 'error');
                }
                document.getElementById('loading-sekolah').classList.add('hidden');
            })
            .withFailureHandler(function(err) {
                showToast("Gagal memuat data sekolah", "error");
                document.getElementById('loading-sekolah').classList.add('hidden');
            })
            .getSekolah();
      } else {
          // Dummy data for testing
          setTimeout(() => {
              if (dataSekolah.length === 0) { // Only load dummy data if array is empty
                  dataSekolah = [
                      {id: 'SKL1', nama: 'SDN 1 Mutih Kulon', alamat: 'Jl. Rungkut Asri No 1', kategori: 'SD/MI', porsi: 'Besar', siswa: 200},
                      {id: 'SKL2', nama: 'MI Darussalam', alamat: 'Jl. KH Ahmad Dahlan', kategori: 'SD/MI', porsi: 'Kecil', siswa: 80},
                      {id: 'SKL3', nama: 'PAUD Melati', alamat: 'Desa Krajan', kategori: 'PAUD', porsi: 'Kecil', siswa: 45},
                      {id: 'SKL4', nama: 'TK Pertiwi Mutih', alamat: 'Jl. Pemuda', kategori: 'TK', porsi: 'Kecil', siswa: 60},
                      {id: 'SKL5', nama: 'SDN 2 Mutih Kulon', alamat: 'Jl. Kebangsaan', kategori: 'SD/MI', porsi: 'Besar', siswa: 150},
                      {id: 'SKL6', nama: 'MI Matholiul Falah', alamat: 'Desa Margoyoso', kategori: 'SD/MI', porsi: 'Besar', siswa: 150},
                      {id: 'SKL7', nama: 'TK Islam Bakti', alamat: 'Jl. Sunan Kalijaga', kategori: 'TK', porsi: 'Kecil', siswa: 55},
                      {id: 'SKL8', nama: 'KB Lestari Baru', alamat: 'Jl. Pahlawan', kategori: 'PAUD', porsi: 'Kecil', siswa: 35}
                  ];
              }
              filteredSekolah = [...dataSekolah];
              sekolahCurrentPage = 1;
              renderTableSekolah();
              document.getElementById('loading-sekolah').classList.add('hidden');
          }, 800);
      }
  }

  function renderTableSekolah() {
      const tbody = document.getElementById('tbody-sekolah');
      tbody.innerHTML = '';
      
      if (filteredSekolah.length === 0) {
          renderEmptyState('table-sekolah', 'empty-sekolah', false);
          updatePaginationSekolah();
          return;
      }
      
      renderEmptyState('table-sekolah', 'empty-sekolah', true);

      // Calc Pagination
      const startIndex = (sekolahCurrentPage - 1) * sekolahItemsPerPage;
      const endIndex = Math.min(startIndex + sekolahItemsPerPage, filteredSekolah.length);
      const paginatedData = filteredSekolah.slice(startIndex, endIndex);

      paginatedData.forEach((item, index) => {
          const delayStyle = `style="animation-delay: ${index * 50}ms;"`;
          const tr = document.createElement('tr');
          tr.className = "hover:bg-blue-50/50 transition-colors fade-in-up opacity-0";
          tr.setAttribute("style", `animation-delay: ${index * 30}ms;`);
          
          tr.innerHTML = `
             <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                   <div class="h-10 w-10 flex-shrink-0 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
                       ${item.nama.charAt(0).toUpperCase()}
                   </div>
                   <div class="ml-4">
                      <div class="text-sm font-bold text-gray-900">${item.nama}</div>
                      <div class="text-xs text-gray-500">ID: ${item.id}</div>
                   </div>
                </div>
             </td>
             <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-gray-900 max-w-xs truncate" title="${item.alamat}">${item.alamat}</div>
             </td>
             <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-indigo-100 text-indigo-800">
                  ${item.kategori}
                </span>
             </td>
             <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 py-1 inline-flex text-xs leading-5 font-bold rounded text-gray-700 bg-gray-100 border border-gray-200">
                  ${item.porsi || '-'}
                </span>
             </td>
             <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium text-gray-900">
                ${item.siswa} <span class="text-gray-400 text-xs font-normal">Porsi</span>
             </td>
             <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button onclick="editSekolah('${item.id}')" class="text-blue-600 hover:text-blue-900 mr-3 px-2 py-1 bg-blue-50 rounded-md transition-colors">Edit</button>
                <button onclick="hapusSekolah('${item.id}')" class="text-red-600 hover:text-red-900 px-2 py-1 bg-red-50 rounded-md transition-colors">Hapus</button>
             </td>
          `;
          tbody.appendChild(tr);
      });
      
      updatePaginationSekolah();
  }

  function updatePaginationSekolah() {
      const totalItems = filteredSekolah.length;
      const totalPages = Math.ceil(totalItems / sekolahItemsPerPage);
      
      document.getElementById('sekolah-total-data').innerText = totalItems;
      
      if(totalItems === 0) {
          document.getElementById('sekolah-page-start').innerText = 0;
          document.getElementById('sekolah-page-end').innerText = 0;
          document.getElementById('sekolah-pagination').innerHTML = '';
          return;
      }
      
      const startIdx = ((sekolahCurrentPage - 1) * sekolahItemsPerPage) + 1;
      const endIdx = Math.min(sekolahCurrentPage * sekolahItemsPerPage, totalItems);
      
      document.getElementById('sekolah-page-start').innerText = startIdx;
      document.getElementById('sekolah-page-end').innerText = endIdx;

      let paginationHTML = '';
      
      // Prev Button
      paginationHTML += `
          <button onclick="changePageSekolah(${sekolahCurrentPage - 1})" ${sekolahCurrentPage === 1 ? 'disabled' : ''} class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 ${sekolahCurrentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}">
              <span class="sr-only">Previous</span>
              <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
          </button>
      `;
      
      // Page Numbers (simplified, max 5 shown)
      let startPage = Math.max(1, sekolahCurrentPage - 2);
      let endPage = Math.min(totalPages, startPage + 4);
      if (endPage - startPage < 4) {
          startPage = Math.max(1, endPage - 4);
      }

      for (let i = startPage; i <= endPage; i++) {
          const isCurrent = (i === sekolahCurrentPage);
          const activeClass = isCurrent ? 'z-10 bg-blue-50 border-blue-500 text-blue-600' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50';
          paginationHTML += `
              <button onclick="changePageSekolah(${i})" class="relative inline-flex items-center px-4 py-2 border text-sm font-medium ${activeClass}">
                 ${i}
              </button>
          `;
      }
      
      // Next Button
      paginationHTML += `
          <button onclick="changePageSekolah(${sekolahCurrentPage + 1})" ${sekolahCurrentPage === totalPages ? 'disabled' : ''} class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 ${sekolahCurrentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}">
              <span class="sr-only">Next</span>
              <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
          </button>
      `;
      
      document.getElementById('sekolah-pagination').innerHTML = paginationHTML;
  }

  function changePageSekolah(newPage) {
      const totalPages = Math.ceil(filteredSekolah.length / sekolahItemsPerPage);
      if(newPage >= 1 && newPage <= totalPages) {
          sekolahCurrentPage = newPage;
          renderTableSekolah();
      }
  }

  function filterTable(tableId, query) {
      const q = (query || '').toLowerCase();
      if(tableId === 'table-sekolah') {
          filteredSekolah = dataSekolah.filter(item => 
              item.nama.toLowerCase().includes(q) || 
              item.alamat.toLowerCase().includes(q)
          );
          // Re-apply select filters if any
          const cat = document.getElementById('filterKategoriSekolah').value;
          if(cat !== 'all') {
             filteredSekolah = filteredSekolah.filter(item => item.kategori === cat);
          }
          const por = document.getElementById('filterPorsiSekolah') ? document.getElementById('filterPorsiSekolah').value : 'all';
          if(por !== 'all') {
             filteredSekolah = filteredSekolah.filter(item => item.porsi === por);
          }
          sekolahCurrentPage = 1;
          renderTableSekolah();
      } else if (tableId === 'table-menu') {
          // Card format just needs to re-render, passing the query is handled inside renderTableMenu
          renderTableMenu();
      } else if (tableId === 'table-bahan') {
          renderTableBahan();
      } else if (tableId === 'table-karyawan') {
          renderTableKaryawan();
      }
  }

  function filterKategori(tableId) {
      if(tableId === 'table-sekolah') {
          const q = document.getElementById('searchSekolah').value.toLowerCase();
          const kat = document.getElementById('filterKategoriSekolah').value;
          const por = document.getElementById('filterPorsiSekolah') ? document.getElementById('filterPorsiSekolah').value : 'all';
          
          filteredSekolah = dataSekolah.filter(item => {
             const matchSearch = item.nama.toLowerCase().includes(q) || item.alamat.toLowerCase().includes(q);
             const matchCat = (kat === 'all') ? true : (item.kategori === kat);
             const matchPor = (por === 'all') ? true : (item.porsi === por);
             
             return matchSearch && matchCat && matchPor;
          });
          sekolahCurrentPage = 1;
          renderTableSekolah();
      }
  }

      e.preventDefault();
      const form = document.getElementById('form-sekolah');
      const btn = document.getElementById('btn-save-sekolah');
      originalText = btn.innerHTML;
      btn.innerHTML = 'Menyimpan...';
      btn.disabled = true;

      const data = {
          id: document.getElementById('sekolah-id').value,
          nama: form.nama.value,
          alamat: form.alamat.value,
          kategori: form.kategori.value,
          porsi: form.porsi.value,
          siswa: form.siswa.value
      };

      if(typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(function(res) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                if(res.status === 'success') {
                    showToast(res.message, 'success');
                    closeModal('modal-sekolah');
                    loadDataSekolah(); // reload data
                } else {
                    showToast(res.message, 'error');
                }
            })
            .saveSekolah(data, currentUser?.username);
      } else {
          setTimeout(()=>{
             btn.innerHTML = originalText;
             btn.disabled = false;
             
             if(data.id) {
                 const idx = dataSekolah.findIndex(s => s.id === data.id);
                 if(idx > -1) {
                     // Update existing
                     dataSekolah[idx] = { ...dataSekolah[idx], ...data };
                 }
             } else {
                 // Add new
                 data.id = 'S' + (dataSekolah.length + 1);
                 dataSekolah.push(data);
             }
             
             filterTable('table-sekolah', document.getElementById('searchSekolah').value || ''); // re-render
             showToast("Tersimpan (Lokal)", "success");
             closeModal('modal-sekolah');
          }, 500);

      if(!dateString) return 'Senin';
      const date = new Date(dateString);

      return days[date.getDay()];

  function formatTanggalIndo(dateString) {

          'Senin': 'bg-blue-100 text-blue-800',
          'Selasa': 'bg-emerald-100 text-emerald-800',

  function renderTableBahan() {
      const tbody = document.getElementById('tbody-bahan');
      if(!tbody) return;
      tbody.innerHTML = '';
      
      const q = document.getElementById('searchBahan') ? document.getElementById('searchBahan').value.toLowerCase() : '';
      const filterStart = document.getElementById('filterStartDateBahan') ? document.getElementById('filterStartDateBahan').value : '';
      const filterEnd = document.getElementById('filterEndDateBahan') ? document.getElementById('filterEndDateBahan').value : '';
      
      const categoryMatch = currentTabBahan === 'basah' ? 'Bahan Basah' : 'Bahan Kering';
      const filtered = dataBahan.filter(b => {
          const matchCat = b.kategori === categoryMatch;
          const matchQuery = (b.nama||'').toLowerCase().includes(q) || (b.id||'').toLowerCase().includes(q);
          
          let matchDate = true;
          if (b.updatedAt) {
              if (filterStart && b.updatedAt < filterStart) matchDate = false;
              if (filterEnd && b.updatedAt > filterEnd) matchDate = false;
          } else if (filterStart || filterEnd) {
              matchDate = false; // Require a date if filters are active
          }
          
          return matchCat && matchQuery && matchDate;
      });
      
      if (filtered.length === 0) {
          renderEmptyState('table-bahan', 'empty-bahan', false); return;
      }
      renderEmptyState('table-bahan', 'empty-bahan', true);

      filtered.forEach((item, idx) => {
          const isLowStock = parseFloat(item.stok) < 10;
          const trClass = isLowStock ? 'bg-red-50/70 hover:bg-red-50 transition-colors' : 'hover:bg-amber-50/50 transition-colors';
          const textClass = isLowStock ? 'text-red-700 font-bold' : 'text-gray-900';
          
          const tr = document.createElement('tr');
          tr.className = `${trClass} fade-in-up opacity-0`;
          tr.setAttribute("style", `animation-delay: ${idx * 30}ms;`);
          
          tr.innerHTML = `
             <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm font-bold ${textClass}">${item.nama}</div>
                <div class="text-xs text-gray-500">${item.id}</div>
             </td>
             <td class="px-6 py-4 whitespace-nowrap text-center">
                <div class="inline-flex items-center justify-center px-4 py-1.5 rounded-full ${isLowStock ? 'bg-red-100 text-red-800' : 'bg-amber-100 text-amber-800'} font-bold text-sm">
                   ${item.stok} <span class="ml-1 opacity-70 border-l ${isLowStock ? 'border-red-300' : 'border-amber-300'} pl-1 font-normal text-xs uppercase">${item.satuan}</span>
                </div>
                ${isLowStock ? '<div class="text-[10px] text-red-500 mt-1 uppercase tracking-wider font-bold animate-pulse">Low Stock!</div>' : ''}
             </td>
             <td class="px-6 py-4 whitespace-nowrap text-center text-sm text-gray-500">
                ${item.updatedAt ? formatTanggalIndo(item.updatedAt) : 'Belum Tersedia'}
             </td>
             <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button onclick="editBahan('${item.id}')" class="text-amber-600 hover:text-amber-900 mr-2 px-2 py-1 bg-amber-50 rounded-md">Update Stok</button>
                <button onclick="hapusBahan('${item.id}')" class="text-red-600 hover:text-red-900 px-2 py-1 bg-red-50 rounded-md">Hapus</button>
             </td>
          `;
          tbody.appendChild(tr);
      });
  }

  function saveBahan(e) {

      const form = document.getElementById('form-bahan');
      const data = {

                 closeModal('modal-bahan'); 
                 // auto switch tab if category changed
                 if(data.id && data.kategori !== (currentTabBahan==='basah'?'Bahan Basah':'Bahan Kering')) {
                     switchTabBahan(data.kategori === 'Bahan Basah' ? 'basah' : 'kering');
                 }
                 loadDataBahan(); 
              } else showToast(res.message, 'error');
          }).saveBahan(data, currentUser?.username);
      } else {
          setTimeout(() => {
              btn.innerHTML = 'Simpan Stok'; btn.disabled = false;
              if (data.id) {
                 const idx = dataBahan.findIndex(b => b.id === data.id);
                 if(idx > -1) dataBahan[idx] = data;
              } else {
                 data.id = 'B' + (dataBahan.length + 1);

              if (data.id && data.kategori !== (currentTabBahan==='basah'?'Bahan Basah':'Bahan Kering')) {

  function exportBahanXLSX() {
      if(typeof XLSX === 'undefined') {
          showToast('Library XLSX belum termuat. Silahkan cek koneksi internet.', 'error');
          return;
      }
      
      const q = document.getElementById('searchBahan') ? document.getElementById('searchBahan').value.toLowerCase() : '';
      const filterStart = document.getElementById('filterStartDateBahan') ? document.getElementById('filterStartDateBahan').value : '';
      const filterEnd = document.getElementById('filterEndDateBahan') ? document.getElementById('filterEndDateBahan').value : '';
      
      // Filter list based on current active searches and date range but export BOTH categories
      const exportList = dataBahan.filter(b => {
          const matchQuery = (b.nama||'').toLowerCase().includes(q) || (b.id||'').toLowerCase().includes(q);
          
          let matchDate = true;
          if (b.updatedAt) {
              if (filterStart && b.updatedAt < filterStart) matchDate = false;
              if (filterEnd && b.updatedAt > filterEnd) matchDate = false;
          } else if (filterStart || filterEnd) {
              matchDate = false;
          }
          
          return matchQuery && matchDate;
      });

      if(exportList.length === 0) {
          showToast('Tidak ada data bahan untuk direkap sesuai kriteria/rentang tanggal ini.', 'warning');
          return;
      }
      
      const exportData = exportList.map(b => ({
          'ID Bahan': b.id,
          'Nama Bahan': b.nama,
          'Kategori': b.kategori,
          'Total Stok': b.stok,
          'Satuan': b.satuan,
          'Terakhir Update': b.updatedAt || '-'
      }));
      
      let titleRange = 'Semua_Waktu';
      if (filterStart && filterEnd) titleRange = `${filterStart}_sd_${filterEnd}`;
      else if (filterStart) titleRange = `Mulai_${filterStart}`;
      else if (filterEnd) titleRange = `Hingga_${filterEnd}`;
      
      const ws = XLSX.utils.json_to_sheet(exportData);
      
      // Setup widths
      ws['!cols'] = [ {wch: 10}, {wch: 30}, {wch: 15}, {wch: 15}, {wch: 10}, {wch: 20} ];
      
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Rekap Bahan");
      
      XLSX.writeFile(wb, `Rekap_Bahan_SPPG_${titleRange}.xlsx`);
  }

  function populateDistribusiDropdowns(options) {
      if(!options) return;
      
      const sSelect = document.getElementById('distribusi-sekolahId');
      const mSelect = document.getElementById('distribusi-menuId');
      const lSelect = document.getElementById('lap-sekolah');
      const lMenu = document.getElementById('lap-menu');
      
      // Preserve first option
      sSelect.innerHTML = '<option value="">-- Pilih Sekolah --</option>';
      mSelect.innerHTML = '<option value="">-- Pilih Menu --</option>';
      if(lSelect) lSelect.innerHTML = '<option value="">-- Pilih Sekolah --</option>';
      if(lMenu) lMenu.innerHTML = '<option value="">-- Pilih Menu --</option>';
      
      options.sekolah.forEach(s => {
         const id = s.ID || s.id || '';
         const nama = s.NamaSekolah || s.nama || '';
         const kat = s.Kategori || s.kategori || '';
         const siswa = s.JumlahSiswa || s.siswa || 0;
         
         // store stringified object as data attr to easily retrieve siswa count later
         const optStr = `<option value="${id}" data-siswa="${siswa}">${nama} ${kat ? '('+kat+')' : ''}</option>`;
         sSelect.insertAdjacentHTML('beforeend', optStr);
         if(lSelect) lSelect.insertAdjacentHTML('beforeend', `<option value="${id}">${nama}</option>`);
      });
      
      options.menu.forEach(m => {
         const id = m.ID || m.id || '';
         const nama = m.NamaMenu || m.nama || '';
         let hari = m.Hari || m.hari || '';
         if (hari === 'undefined') hari = '';
         
         const displayHari = hari ? `${hari} - ` : '';
         const mStr = `<option value="${id}">${displayHari}${nama}</option>`;
         
         mSelect.insertAdjacentHTML('beforeend', mStr);
         if(lMenu) lMenu.insertAdjacentHTML('beforeend', mStr);
      });
  }

          if(typeof google !== 'undefined') {
              google.script.run.withSuccessHandler(r => {
                  if(r.status === 'success') { showToast(r.message, 'success'); loadDataDistribusi(); }
                  else showToast(r.message, 'error');
              }).deleteDistribusi(id, currentUser?.username);
          } else {
              dataDistribusi = dataDistribusi.filter(d => d.ID !== id);
              renderTableDistribusi();
              showToast('Distribusi dihapus (Lokal)', 'success');
          }
      }
  }

  function loadDataLaporan() {
      const btn = document.getElementById('btn-generate-lap');
      if(btn) { btn.innerHTML = 'Memuat Data...'; btn.disabled = true; }
      
      if(typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(res => {
                if(res.status === 'success') {
                    populateDistribusiDropdowns({ sekolah: res.data.options.sekolah, menu: res.data.options.menu });
                }
                if(btn) {
                    btn.disabled = false;
                    btn.innerHTML = `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg> Preview & Cetak Halaman`;
                }
            }).getDistribusi();
      } else {
          // Dummy data local
          if (dataSekolah.length === 0) loadDataSekolah();
          if (dataMenu.length === 0) loadDataMenu();
          
          function checkAndLoad() {
              if (dataSekolah.length === 0 || dataMenu.length === 0) {
                  setTimeout(checkAndLoad, 100);
                  return;
              }
              const mappedSekolahOptions = dataSekolah.map(s => ({ID: s.id || s.nama, NamaSekolah: s.nama, Kategori: s.kategori, JumlahSiswa: s.siswa}));
              const mappedMenuOptions = dataMenu.map(m => ({ID: m.id || m.nama, Hari: m.hari, NamaMenu: m.nama}));
              
              populateDistribusiDropdowns({
                  sekolah: mappedSekolahOptions,
                  menu: mappedMenuOptions
              });
              
              if(btn) {
                  btn.disabled = false;
                  btn.innerHTML = `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg> Preview & Cetak Halaman`;
              }
          }
          checkAndLoad();
      }
  }

  function generateLaporan(e) {
      e.preventDefault();
      const tgl = document.getElementById('lap-tanggal').value;
      const sekId = document.getElementById('lap-sekolah').value;
      const menId = document.getElementById('lap-menu').value;
      const sppg = document.getElementById('lap-sppg').value || '.........................';
      const gizi = document.getElementById('lap-gizi').value || '.........................';
      const penerima = document.getElementById('lap-penerima').value || '.........................';
      
      if (!tgl || !sekId || !menId) {
          showToast('Silahkan lengkapi data penyaluran Laporan', 'error');
          return;
      }
      
      const s = dataSekolah.find(x => x.id === sekId || x.ID === sekId);
      const m = dataMenu.find(x => x.id === menId || x.ID === menId);
      
      const pData = {
          tanggal: tgl,
          sekolah: s ? (s.nama || s.NamaSekolah) : sekId,
          menu: m ? (m.nama || m.NamaMenu) : menId,
          buah: m ? (m.buah || m.Buah || '-') : '-',
          karbohidrat: m ? (m.karbo || m.Karbohidrat || '0') : '0',
          protein: m ? (m.protein || m.Protein || '0') : '0',
          lemak: m ? (m.lemak || m.Lemak || '0') : '0',
          kalori: m ? (m.kalori || m.Kalori || '0') : '0',
          vitamin: m ? (m.vitamin || m.Vitamin || '-') : '-',
          sppg: sppg,
          gizi: gizi,
          penerima: penerima
      };
      
      const query = new URLSearchParams(pData).toString();
      const url = `/?page=print&${query}`;
      window.open(url, '_blank');
  }

  // ==========================================
  // CRUD KARYAWAN
  // ==========================================
  
  let dataKaryawan = [];
  
  function loadDataKaryawan() {
      document.getElementById('loading-karyawan').classList.remove('hidden');
      if(typeof google !== 'undefined') {
          google.script.run
            .withSuccessHandler(res => {
                if(res.status === 'success') {
                    dataKaryawan = res.data;
                    renderTableKaryawan();
                } else {
                    showToast(res.message, 'error');
                }
                document.getElementById('loading-karyawan').classList.add('hidden');
            }).getKaryawan();
      } else {
          // Dummy data
          setTimeout(() => {
              if (dataKaryawan.length === 0) {
                  dataKaryawan = [
                      {id: 'K1', nama: 'Budi Santoso', jabatan: 'Koordinator Dapur', nohp: '081234567890'},
                      {id: 'K2', nama: 'Siti Aminah', jabatan: 'Ahli Gizi', nohp: '085678901234'},
                      {id: 'K3', nama: 'Ahmad Fauzan', jabatan: 'Kurir Distribusi', nohp: '089876543210'},
                  ];
              }
              renderTableKaryawan();
              document.getElementById('loading-karyawan').classList.add('hidden');
          }, 800);
      }
  }

  function renderTableKaryawan() {
      const tbody = document.getElementById('tbody-karyawan');
      tbody.innerHTML = '';
      
      const query = document.getElementById('searchKaryawan').value.toLowerCase();
      const filtered = dataKaryawan.filter(k => 
         k.nama.toLowerCase().includes(query) || k.jabatan.toLowerCase().includes(query)
      );
      
      if (filtered.length === 0) {
          renderEmptyState('table-karyawan', 'empty-karyawan', false); return;
      }
      renderEmptyState('table-karyawan', 'empty-karyawan', true);

      filtered.forEach((item, idx) => {
          const tr = document.createElement('tr');
          tr.className = "hover:bg-teal-50/50 transition-colors fade-in-up opacity-0";
          tr.setAttribute("style", `animation-delay: ${idx * 30}ms;`);
          
          tr.innerHTML = `
             <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
                   <div class="h-10 w-10 flex-shrink-0 rounded-full bg-teal-100 flex items-center justify-center text-teal-600 font-bold">
                       ${item.nama.charAt(0).toUpperCase()}
                   </div>
                   <div class="ml-4">
                      <div class="text-sm font-bold text-gray-900">${item.nama}</div>
                      <div class="text-xs text-gray-500">ID: ${item.id}</div>
                   </div>
                </div>
             </td>
             <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${item.jabatan}</td>
             <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-gray-900 font-mono">${item.nohp}</td>
             <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button onclick="editKaryawan('${item.id}')" class="text-teal-600 hover:text-teal-900 mr-2 px-2 py-1 bg-teal-50 rounded-md">Edit</button>
                <button onclick="hapusKaryawan('${item.id}')" class="text-red-600 hover:text-red-900 px-2 py-1 bg-red-50 rounded-md">Hapus</button>
             </td>
          `;
          tbody.appendChild(tr);
      });
  }

  function openModalKaryawan() {
      document.getElementById('form-karyawan').reset();
      document.getElementById('karyawan-id').value = '';
      document.getElementById('modal-karyawan').classList.remove('hidden');
  }

  function editKaryawan(id) {
      const item = dataKaryawan.find(d => d.id === id);
      if(!item) return;
      document.getElementById('karyawan-id').value = item.id;
      document.getElementById('karyawan-nama').value = item.nama;
      document.getElementById('karyawan-jabatan').value = item.jabatan;
      document.getElementById('karyawan-nohp').value = item.nohp;
      document.getElementById('modal-karyawan').classList.remove('hidden');
  }

  function saveKaryawan(e) {
      e.preventDefault();
      const form = document.getElementById('form-karyawan');
      const data = {
          id: document.getElementById('karyawan-id').value,
          nama: form.nama.value,
          jabatan: form.jabatan.value,
          nohp: form.nohp.value
      };
      
      const btn = document.getElementById('btn-save-karyawan');
      btn.innerHTML = 'Menyimpan...'; btn.disabled = true;

      if(typeof google !== 'undefined') {
          google.script.run.withSuccessHandler(res => {
              btn.innerHTML = 'Simpan Data'; btn.disabled = false;
              if(res.status === 'success') { 
                 showToast(res.message, 'success'); 
                 closeModal('modal-karyawan'); 
                 loadDataKaryawan(); 
              } else showToast(res.message, 'error');
          }).saveKaryawan(data, currentUser?.username);
      } else {
          setTimeout(() => {
              btn.innerHTML = 'Simpan Data'; btn.disabled = false;
              if (data.id) {
                 const idx = dataKaryawan.findIndex(k => k.id === data.id);
                 if(idx > -1) dataKaryawan[idx] = data;
              } else {
                 data.id = 'K' + (dataKaryawan.length + 1);
                 dataKaryawan.push(data);
              }
              renderTableKaryawan();
              showToast('Lokal: Karyawan disimpan', 'success');
              closeModal('modal-karyawan');
          }, 500);
      }
  }

  function hapusKaryawan(id) {
      if(confirm('Hapus log karyawan ini?')) {
          if(typeof google !== 'undefined') {
              google.script.run.withSuccessHandler(r => {
                  if(r.status === 'success') { showToast(r.message, 'success'); loadDataKaryawan(); }
                  else showToast(r.message, 'error');
              }).deleteKaryawan(id, currentUser?.username);
          } else {
              dataKaryawan = dataKaryawan.filter(d => d.id !== id);
              renderTableKaryawan();
              showToast('Karyawan dihapus (Lokal)', 'success');
          }
      }
  }

  function exportKaryawanExcel() {
      if (!dataKaryawan || dataKaryawan.length === 0) {
          showToast('Tidak ada data karyawan untuk diekspor', 'warning');
          return;
      }
      
      showToast('Menyiapkan file Excel...', 'info');
      
      try {
          // Siapkan data untuk SheetJS
          const worksheetData = [];
          
          // Header
          worksheetData.push(['ID Karyawan', 'Nama Lengkap', 'Jabatan / Peran', 'No. HP']);
          
          // Row data
          dataKaryawan.forEach(item => {
              worksheetData.push([
                  item.id,
                  item.nama,
                  item.jabatan,
                  item.nohp // SheetJS akan otomatis handle ini sebagai string selama format defaultnya General/Text
              ]);
          });
          
          // Buat Worksheet
          const ws = XLSX.utils.aoa_to_sheet(worksheetData);
          
          // Atur lebar kolom (rapi)
          const wscols = [
              {wch: 15}, // ID Karyawan
              {wch: 30}, // Nama
              {wch: 25}, // Jabatan
              {wch: 20}  // No HP
          ];
          ws['!cols'] = wscols;
          
          // Styling dasar (Header bold dll di SheetJS CE/Free butuh plugin tambahan, tapi setidaknya data rapi).
          // Buat Workbook
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Data Karyawan");
          
          // Konversi dan Unduh
          const fileName = `Data_Karyawan_SPPG_${new Date().getTime()}.xlsx`;
          XLSX.writeFile(wb, fileName);
          
          showToast('File Excel berhasil didownload', 'success');
      } catch (err) {
          console.error(err);
          showToast('Gagal memproses file Excel.', 'error');
      }
  }

  // Hook load data ke navigation
  const originalLoadPage = loadPage;
  loadPage = function(pageId, linkEl) {
      originalLoadPage(pageId, linkEl);
      if(pageId === 'sekolah' && dataSekolah.length === 0) loadDataSekolah();
      if(pageId === 'menu' && dataMenu.length === 0) loadDataMenu();
      if(pageId === 'bahan' && dataBahan.length === 0) loadDataBahan();
      if(pageId === 'distribusi' && dataDistribusi.length === 0) loadDataDistribusi();
      if(pageId === 'karyawan' && dataKaryawan.length === 0) loadDataKaryawan();
      if(pageId === 'laporan') loadDataLaporan();
  }
  
  // ==========================================
  // DARK MODE TOGGLE
  // ==========================================
  function initTheme() {
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      
      renderThemeButton();
  }
  
  function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
      } else {
          document.documentElement.classList.add('dark');
          localStorage.theme = 'dark';
      }
      renderThemeButton();
  }
  
  function renderThemeButton() {
     // Wait a bit if DOM wasn't fully ready since nav is async occasionally
     setTimeout(() => {
         const themeBtnContainer = document.getElementById('theme-toggle-container');
         if(themeBtnContainer) {
             const isDark = document.documentElement.classList.contains('dark');
             themeBtnContainer.innerHTML = isDark 
               ? `<button onclick="toggleTheme()" class="p-2 text-gray-400 hover:text-white rounded-lg hover:bg-gray-800 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button>`
               : `<button onclick="toggleTheme()" class="p-2 text-gray-500 hover:text-gray-900 rounded-lg hover:bg-gray-100 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button>`;
         }
     }, 100);
  }

  // Initialize Theme on startup
  initTheme();

</script>

<div class="flex h-full w-full items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  
  <!-- Decorative Background Elements & Doodles -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none bg-blue-50/50">
     <!-- Glowing Orbs -->
     <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-blue-200/40 blur-3xl animate-pulse"></div>
     <div class="absolute top-[60%] -right-[10%] w-[40%] h-[50%] rounded-full bg-indigo-200/30 blur-3xl animate-pulse" style="animation-delay: 2s;"></div>
     <div class="absolute top-[20%] right-[20%] w-[30%] h-[30%] rounded-full bg-teal-100/40 blur-3xl animate-pulse" style="animation-delay: 4s;"></div>
     
     <!-- Floating Doodles (Food & Nutrition Theme) -->
     <style>
        .gizi-doodle { position: absolute; opacity: 0.15; color: #4B5563; }
        .float-fast { animation: float-around 15s ease-in-out infinite; }
        .float-slow { animation: float-around 25s ease-in-out infinite reverse; }
        .float-medium { animation: float-around 20s ease-in-out infinite; }
        
        @keyframes float-around {
           0% { transform: translate(0, 0) rotate(0deg) scale(1); }
           25% { transform: translate(20px, -30px) rotate(10deg) scale(1.05); }
           50% { transform: translate(-10px, -50px) rotate(-5deg) scale(0.95); }
           75% { transform: translate(-30px, -20px) rotate(15deg) scale(1.02); }
           100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }
        
        /* Entrance animation for the login container */
        @keyframes login-pop {
           0% { opacity: 0; transform: translateY(40px) scale(0.95); }
           100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-animated { animation: login-pop 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
     </style>
     
     <!-- Apple Doodle -->
     <svg class="gizi-doodle float-fast" style="top: 15%; left: 12%; width: 80px; height: 80px;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2C7.589 2 4 5.589 4 9.995 3.971 16.44 11.696 22.15 12 22.15c.304 0 8.029-5.71 8.005-12.15C20 5.589 16.411 2 12 2zm0 0v3m0 0a2 2 0 100 4 2 2 0 000-4z"></path></svg>
     <!-- Carrot Doodle -->
     <svg class="gizi-doodle float-slow" style="top: 25%; right: 15%; width: 100px; height: 100px;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.5 3c-1.5 0-3.5.5-5 2l-8 8c-1.5 1.5-2 3.5-1.5 4.5.5 1 2.5.5 4-1l8-8c1.5-1.5 2-3.5 2-4.5 0-1-1-1.5-2-1.5z M12 7l5 5"></path></svg>
     <!-- Milk/Glass Doodle -->
     <svg class="gizi-doodle float-medium" style="bottom: 15%; left: 18%; width: 90px; height: 90px; animation-delay: -5s;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5zm-4 12H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V7h10v2z"></path></svg>
     <!-- Fish Doodle -->
     <svg class="gizi-doodle float-fast" style="bottom: 25%; right: 20%; width: 85px; height: 85px; animation-delay: -7s;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4C7.58 4 4 7.58 4 12s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm-2 10c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6-3h-2v2h2v-2z"></path></svg>
     <!-- Egg/Protein Doodle -->
     <svg class="gizi-doodle float-slow" style="top: 60%; left: 8%; width: 70px; height: 70px; animation-delay: -12s;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2C8.13 2 5 6.48 5 12s3.13 10 7 10 7-4.48 7-10S15.87 2 12 2z"></path></svg>
  </div>

  <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-sm p-10 rounded-2xl shadow-xl border border-white/40 z-10 fade-in-up login-animated">
    <div>
      <div class="mx-auto h-28 w-28 bg-white rounded-full flex items-center justify-center shadow-sm p-2 mb-6 border border-gray-100">
         <img class="h-full w-full object-contain" src="https://i.ibb.co.com/8gDNvQZV/download-removebg-preview.png" alt="Logo SPPG">
      </div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
        SPPG Mutih Kulon
      </h2>
      <p class="mt-2 text-center text-sm text-gray-500 font-medium tracking-wide">
        Sistem Manajemen Badan Gizi Nasional
      </p>
    </div>
    <form id="loginForm" class="mt-10 space-y-6" onsubmit="handleLogin(event)">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <div class="relative rounded-md shadow-sm">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
             </div>
             <input id="username" name="username" type="text" required class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition bg-gray-50 focus:bg-white text-gray-900 text-sm" placeholder="Masukkan username">
          </div>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative rounded-md shadow-sm">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
             </div>
             <input id="password" name="password" type="password" required class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition bg-gray-50 focus:bg-white text-gray-900 text-sm" placeholder="••••••••">
          </div>
        </div>
      </div>

      <div id="login-error" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
         <div class="flex">
            <div class="flex-shrink-0">
               <svg class="h-5 w-5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
            </div>
            <div class="ml-3">
               <p class="text-sm text-red-700" id="login-error-text"></p>
            </div>
         </div>
      </div>

      <div>
        <button type="submit" id="btn-login" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">
          Sign In Dashboard
        </button>
      </div>
    </form>
    
    <div class="mt-8 pt-6 border-t border-gray-100">
      <p class="text-center text-xs text-gray-400 font-medium">
         &copy; 2026 Badan Gizi Nasional<br>
         Hak Cipta Dilindungi Undang-Undang
      </p>
    </div>
  </div>
</div>

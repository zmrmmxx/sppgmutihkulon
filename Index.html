    <!-- Include CSS & Libraries -->
    <?!= include('Style'); ?>
    
    <script>
      window.onerror = function(msg, url, line, col, error) {
         fetch('/log-error', {
            method: 'POST',
            body: JSON.stringify({ msg, line, col, stack: error ? error.stack : '' }),
            headers: {'Content-Type': 'application/json'}
         }).catch(e => console.error(e));
         return false;
      };
      
      // Catat juga unhandled pomises
      window.addEventListener('unhandledrejection', function(event) {
         fetch('/log-error', {
            method: 'POST',
            body: JSON.stringify({ msg: 'Unhandled Promise Rejection: ' + event.reason }),
            headers: {'Content-Type': 'application/json'}
         }).catch(e => console.error(e));
      });
    </script>
  </head>
